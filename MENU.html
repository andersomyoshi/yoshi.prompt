<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Launcher Yoshi - Grupos e Pastas</title>
    <style>
        :root {
            --bg-phone: #0f0f0f;
            --bg-app: #181818;
            --primary: #007bff;
            --danger: #ff4444;
            --success: #00c851;
            --folder-bg: #333;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: sans-serif; background: var(--bg-phone); margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; color: white; }

        .phone { width: 360px; height: 740px; background: var(--bg-app); border: 10px solid #222; border-radius: 40px; position: relative; display: flex; flex-direction: column; overflow: hidden; }
        
        .header { height: 60px; background: var(--primary); display: flex; justify-content: space-between; align-items: center; padding: 0 20px; }
        .back-btn { background: none; border: none; color: white; font-size: 20px; cursor: pointer; visibility: hidden; }
        .add-btn { background: none; border: none; color: white; font-size: 30px; cursor: pointer; }

        .grid { flex: 1; display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; padding: 20px; overflow-y: auto; align-content: start; }

        .app-item { display: flex; flex-direction: column; align-items: center; cursor: pointer; position: relative; width: 100%; }
        
        /* CORREÇÃO DO ÍCONE ESTOURADO */
        .icon-box { 
            width: 65px; height: 65px; border-radius: 15px; 
            background: #2a2a2a; display: flex; justify-content: center; 
            align-items: center; overflow: hidden; position: relative;
            border: 1px solid #444; font-size: 30px;
        }
        .icon-box img { width: 100%; height: 100%; object-fit: cover; }
        
        /* Pasta Visual */
        .is-folder { border: 2px solid var(--primary); }
        .folder-badge { position: absolute; bottom: 2px; right: 2px; font-size: 10px; background: var(--primary); padding: 2px 4px; border-radius: 4px; }

        .label { font-size: 11px; margin-top: 5px; text-align: center; width: 100%; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* MODAL */
        .modal { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; flex-direction: column; justify-content: flex-end; z-index: 100; }
        .modal-content { background: #222; padding: 20px; border-radius: 25px 25px 0 0; display: flex; flex-direction: column; gap: 10px; }
        input, select { padding: 12px; border-radius: 8px; border: 1px solid #444; background: #111; color: white; }
        .btn { padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        
        .managing .app-item { animation: shake 0.2s infinite; }
        @keyframes shake { 0% {transform: rotate(-1deg)} 50% {transform: rotate(1deg)} }
    </style>
</head>
<body>

    <div class="phone">
        <div class="header">
            <button class="back-btn" id="btnBack" onclick="goBack()">❮ Voltar</button>
            <button class="add-btn" onclick="openMenu()">+</button>
        </div>
        <div class="grid" id="mainGrid"></div>
    </div>

    <div class="modal" id="modalMenu">
        <div class="modal-content">
            <button class="btn" style="background:var(--success)" onclick="openForm('add')">+ Adicionar Item</button>
            <button class="btn" style="background:var(--primary)" onclick="setMode('edit')">✏️ Editar / Excluir</button>
            <div style="display:flex; gap:10px;">
                <button class="btn" style="flex:1; background:#444" onclick="exportData()">💾 Backup</button>
                <button class="btn" style="flex:1; background:#444" onclick="document.getElementById('fileIn').click()">📂 Restaurar</button>
            </div>
            <input type="file" id="fileIn" style="display:none" onchange="importData(event)">
            <button class="btn" style="background:#666" onclick="closeModal('modalMenu')">Fechar</button>
        </div>
    </div>

    <div class="modal" id="modalForm">
        <div class="modal-content">
            <h3 id="formTitle">Novo Item</h3>
            <input type="text" id="itemName" placeholder="Nome">
            <input type="text" id="itemIcon" placeholder="Emoji 🚀 ou Link Imagem">
            <select id="itemType" onchange="toggleUrlField()">
                <option value="link">Link Direto</option>
                <option value="folder">Pasta (Subgrupo)</option>
            </select>
            <input type="url" id="itemUrl" placeholder="https://...">
            <button class="btn" style="background:var(--success)" onclick="saveItem()">Salvar</button>
            <button class="btn" style="background:#444" onclick="closeModal('modalForm')">Cancelar</button>
        </div>
    </div>

    <script>
        const KEY = 'yoshi_v8';
        let data = JSON.parse(localStorage.getItem(KEY)) || { items: [] };
        let currentFolder = null; // null = raiz, ou o objeto da pasta
        let mode = 'normal'; // normal, edit
        let editingIndex = null;

        function render() {
            const grid = document.getElementById('mainGrid');
            const btnBack = document.getElementById('btnBack');
            grid.innerHTML = '';
            grid.className = 'grid ' + (mode === 'edit' ? 'managing' : '');

            // Se estiver em uma pasta, mostra botão voltar
            btnBack.style.visibility = currentFolder ? 'visible' : 'hidden';

            const list = currentFolder ? currentFolder.subItems : data.items;

            list.forEach((item, i) => {
                const div = document.createElement('div');
                div.className = 'app-item';
                div.onclick = () => handleClick(i);

                let iconHtml = item.icon.startsWith('http') ? `<img src="${item.icon}">` : item.icon;
                let folderTag = item.type === 'folder' ? `<span class="folder-badge">PASTA</span>` : '';

                div.innerHTML = `
                    <div class="icon-box ${item.type === 'folder' ? 'is-folder' : ''}">
                        ${iconHtml}
                        ${folderTag}
                    </div>
                    <div class="label">${item.name}</div>
                `;
                grid.appendChild(div);
            });
            localStorage.setItem(KEY, JSON.stringify(data));
        }

        function handleClick(i) {
            const list = currentFolder ? currentFolder.subItems : data.items;
            const item = list[i];

            if (mode === 'edit') {
                if(confirm("Deseja EXCLUIR este item? (Para editar, delete e crie de novo nesta versão)")) {
                    list.splice(i, 1);
                    mode = 'normal';
                    render();
                }
                return;
            }

            if (item.type === 'folder') {
                currentFolder = item;
                if (!currentFolder.subItems) currentFolder.subItems = [];
                render();
            } else {
                if(item.url) window.open(item.url, '_blank');
            }
        }

        function goBack() { currentFolder = null; render(); }

        function openMenu() { document.getElementById('modalMenu').style.display = 'flex'; }
        function openForm() { 
            closeModal('modalMenu'); 
            document.getElementById('modalForm').style.display = 'flex'; 
        }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }

        function toggleUrlField() {
            const type = document.getElementById('itemType').value;
            document.getElementById('itemUrl').style.display = (type === 'folder') ? 'none' : 'block';
        }

        function saveItem() {
            const name = document.getElementById('itemName').value;
            const icon = document.getElementById('itemIcon').value;
            const type = document.getElementById('itemType').value;
            const url = document.getElementById('itemUrl').value;

            if(!name) return alert("Nome obrigatório");

            const newItem = { name, icon: icon || '📱', type, url: url || '#', subItems: [] };
            
            if (currentFolder) currentFolder.subItems.push(newItem);
            else data.items.push(newItem);

            closeModal('modalForm');
            render();
        }

        function setMode(m) { mode = m; closeModal('modalMenu'); render(); }
        
        // Backup
        function exportData() {
            const a = document.createElement('a');
            a.href = 'data:text/json;charset=utf-8,' + encodeURIComponent(JSON.stringify(data));
            a.download = 'backup_yoshi.json'; a.click();
        }

        function importData(e) {
            const reader = new FileReader();
            reader.onload = (ev) => { data = JSON.parse(ev.target.result); render(); };
            reader.readAsText(e.target.files[0]);
        }

        render();
    </script>
</body>
</html>
