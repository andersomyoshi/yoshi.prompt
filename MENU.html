<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Launcher Yoshi Pro</title>
    <style>
        :root {
            --bg-phone: #121212;
            --bg-app: #1e1e1e;
            --primary: #3700b3;
            --danger: #cf6679;
            --warning: #fdd835;
            --success: #03dac6;
        }

        body {
            font-family: sans-serif;
            background-color: var(--bg-phone);
            margin: 0; display: flex; justify-content: center; align-items: center;
            height: 100vh; overflow: hidden; color: white;
        }

        .phone-container {
            width: 360px; height: 740px;
            background-color: var(--bg-app);
            border: 10px solid #333; border-radius: 40px;
            position: relative; display: flex; flex-direction: column;
        }

        .status-bar {
            height: 60px; background: var(--primary);
            display: flex; justify-content: center; align-items: center;
        }

        .add-main-btn {
            background: none; border: none; color: white; font-size: 35px; cursor: pointer;
        }

        .app-grid {
            flex: 1; display: grid; grid-template-columns: repeat(4, 1fr);
            gap: 15px; padding: 20px; overflow-y: auto; align-content: start;
        }

        .app-item { display: flex; flex-direction: column; align-items: center; cursor: pointer; position: relative; }

        .app-icon {
            width: 60px; height: 60px; border-radius: 15px;
            background: #333; display: flex; justify-content: center; align-items: center;
            font-size: 30px; border: 1px solid #444; overflow: hidden;
        }

        .app-icon img { width: 100%; height: 100%; object-fit: cover; }

        .app-label { font-size: 11px; margin-top: 5px; text-align: center; width: 100%; }

        /* Estilo de Exclusão */
        .del-badge {
            position: absolute; top: -5px; right: -5px; background: var(--danger);
            width: 20px; height: 20px; border-radius: 50%; display: none;
            justify-content: center; align-items: center; font-size: 12px; font-weight: bold;
        }

        .managing .del-badge { display: flex; }
        .managing .app-item { animation: shake 0.3s infinite; }
        @keyframes shake { 0% {transform: rotate(-1deg)} 50% {transform: rotate(1deg)} }

        /* MODAL */
        .modal {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); display: none; flex-direction: column;
            justify-content: flex-end; z-index: 100;
        }

        .modal-content {
            background: #2a2a2a; padding: 20px; border-radius: 25px 25px 0 0;
            display: flex; flex-direction: column; gap: 10px;
        }

        input { padding: 12px; border-radius: 8px; border: 1px solid #444; background: #1a1a1a; color: white; }
        
        .btn { padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .btn-add { background: var(--success); }
        .btn-save { background: var(--warning); }
        .btn-del { background: var(--danger); color: white; }
        .btn-close { background: #555; color: white; }

        .backup-row { display: flex; gap: 10px; margin-top: 10px; padding-top: 10px; border-top: 1px dashed #555; }
        .btn-mini { flex: 1; font-size: 10px; padding: 5px; background: #444; color: #ccc; border: 1px solid #555; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="phone-container">
        <div class="status-bar">
            <button class="add-main-btn" onclick="openModal('menuModal')">+</button>
        </div>
        <div class="app-grid" id="grid"></div>
    </div>

    <div class="modal" id="menuModal" onclick="closeIfOutside(event)">
        <div class="modal-content">
            <h3 style="margin:0 0 10px 0">Opções</h3>
            <button class="btn btn-add" onclick="prepareAdd()">+ Novo Aplicativo</button>
            <button class="btn" style="background:#444; color:white" onclick="startManage('edit')">✏️ Editar Aplicativos</button>
            <button class="btn btn-del" onclick="startManage('delete')">🗑️ Excluir Aplicativos</button>
            
            <div class="backup-row">
                <button class="btn-mini" onclick="exportData()">💾 Backup</button>
                <button class="btn-mini" onclick="document.getElementById('fileIn').click()">📂 Restaurar</button>
            </div>
            <input type="file" id="fileIn" style="display:none" onchange="importData(event)">
            <button class="btn btn-close" onclick="closeModal('menuModal')">Fechar</button>
        </div>
    </div>

    <div class="modal" id="formModal" onclick="closeIfOutside(event)">
        <div class="modal-content">
            <h3 id="formTitle">Novo App</h3>
            <input type="hidden" id="editIndex">
            <label>Nome:</label>
            <input type="text" id="appName">
            <label>Ícone (Emoji ou Link .png):</label>
            <input type="text" id="appIcon" placeholder="Ex: 🚀 ou http://...">
            <label>Link de Destino:</label>
            <input type="url" id="appUrl" placeholder="https://...">
            
            <button id="saveBtn" class="btn btn-add" onclick="saveApp()">Salvar</button>
            <button class="btn btn-close" onclick="closeModal('formModal')">Cancelar</button>
        </div>
    </div>

    <script>
        const KEY = 'yoshi_v6';
        let apps = JSON.parse(localStorage.getItem(KEY)) || [{name:'Google', icon:'🌐', url:'https://google.com'}];
        let mode = 'normal'; // normal, edit, delete

        function render() {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            grid.className = 'app-grid ' + (mode !== 'normal' ? 'managing' : '');

            apps.forEach((app, i) => {
                const div = document.createElement('div');
                div.className = 'app-item';
                div.onclick = () => handleClick(i);

                let iconHtml = app.icon.startsWith('http') ? `<img src="${app.icon}">` : app.icon;

                div.innerHTML = `
                    <div class="app-icon">${iconHtml}</div>
                    <div class="app-label">${app.name}</div>
                    <div class="del-badge">✕</div>
                `;
                grid.appendChild(div);
            });
            localStorage.setItem(KEY, JSON.stringify(apps));
        }

        function handleClick(i) {
            if (mode === 'normal') {
                window.open(apps[i].url, '_blank');
            } else if (mode === 'delete') {
                if(confirm('Excluir ' + apps[i].name + '?')) {
                    apps.splice(i, 1);
                    mode = 'normal';
                    render();
                }
            } else if (mode === 'edit') {
                prepareEdit(i);
            }
        }

        // --- FUNÇÕES DE MODAL ---
        function openModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        function closeIfOutside(e) { if(e.target.className === 'modal') closeModal(e.target.id); }

        function startManage(m) {
            mode = m;
            closeModal('menuModal');
            render();
            alert('Modo ' + m + ' ativado! Clique no ícone desejado.');
        }

        // --- ADICIONAR / EDITAR ---
        function prepareAdd() {
            document.getElementById('formTitle').innerText = 'Novo App';
            document.getElementById('editIndex').value = '-1';
            document.getElementById('appName').value = '';
            document.getElementById('appIcon').value = '';
            document.getElementById('appUrl').value = '';
            document.getElementById('saveBtn').className = 'btn btn-add';
            closeModal('menuModal');
            openModal('formModal');
        }

        function prepareEdit(i) {
            document.getElementById('formTitle').innerText = 'Editar App';
            document.getElementById('editIndex').value = i;
            document.getElementById('appName').value = apps[i].name;
            document.getElementById('appIcon').value = apps[i].icon;
            document.getElementById('appUrl').value = apps[i].url;
            document.getElementById('saveBtn').className = 'btn btn-save';
            openModal('formModal');
        }

        function saveApp() {
            const idx = parseInt(document.getElementById('editIndex').value);
            const newApp = {
                name: document.getElementById('appName').value,
                icon: document.getElementById('appIcon').value || '📱',
                url: document.getElementById('appUrl').value
            };

            if(!newApp.name || !newApp.url) return alert('Preencha nome e link!');

            if(idx === -1) apps.push(newApp);
            else apps[idx] = newApp;

            mode = 'normal';
            closeModal('formModal');
            render();
        }

        // --- BACKUP ---
        function exportData() {
            const blob = new Blob([JSON.stringify(apps)], {type: 'application/json'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = 'backup_yoshi.json'; a.click();
        }

        function importData(e) {
            const reader = new FileReader();
            reader.onload = (event) => {
                apps = JSON.parse(event.target.result);
                render();
                alert('Backup restaurado!');
            };
            reader.readAsText(e.target.files[0]);
        }

        // Clique duplo no + para resetar modo
        document.querySelector('.add-main-btn').ondblclick = () => { mode = 'normal'; render(); };

        render();
    </script>
</body>
</html>
